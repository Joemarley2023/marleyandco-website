<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Thank you — Marley &amp; Co</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1c1a17;--paper:#f4f1ea;--bronze:#8a6d4b;--muted:#7c7568}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Inter",sans-serif;background:var(--paper);color:var(--ink);font-weight:300;
       min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px;text-align:center}
  .eyebrow{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--bronze);font-weight:500;margin-bottom:18px}
  h1{font-family:"Fraunces",serif;font-weight:400;font-size:clamp(34px,6vw,60px);line-height:1.1;margin-bottom:20px}
  p{color:var(--muted);font-size:17px;max-width:44ch;margin:0 auto 32px;line-height:1.6}
  a.btn{display:inline-block;background:var(--ink);color:var(--paper);font-size:13px;letter-spacing:.12em;
        text-transform:uppercase;padding:14px 32px;border-radius:8px}
  a.btn:hover{opacity:.85}
</style>
</head>
<body>
  <div>
    <div class="eyebrow">Marley &amp; Co</div>
    <h1>Thank you.</h1>
    <p>We've received your enquiry and will be in touch shortly. We look forward to seeing the project.</p>
    <a class="btn" href="index.html">Back to site</a>
  </div>
</body>
</html>
